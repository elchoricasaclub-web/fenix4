<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FENIX4</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: red; z-index: 9999; padding: 20px; font-family: monospace; white-space: pre-wrap; overflow: auto;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.innerText += 'Error: ' + message + '\nAt: ' + source + ':' + lineno + ':' + colno + '\n\n' + (error && error.stack ? error.stack : '') + '\n\n';
      };
      window.addEventListener('unhandledrejection', function(event) {
        var overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.innerText += 'Unhandled Promise Rejection: ' + (event.reason && event.reason.message ? event.reason.message : event.reason) + '\n\n' + (event.reason && event.reason.stack ? event.reason.stack : '') + '\n\n';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
